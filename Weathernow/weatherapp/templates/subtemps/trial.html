<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <nav>
    <form method="post" >
    {% csrf_token %}
        <label>Enter city:</label>
        <input type="text" name="city_name" required>
        <button type="submit">See weather</button>
    </form>
    </nav>

    {% for w in weather %}
       <p>{{w.city}}</p>
       <p>{{w.weather}}</p>
       <p>{{w.Temp}}</p>

    {%  endfor %}
    <br><br>

</body>
</html>
